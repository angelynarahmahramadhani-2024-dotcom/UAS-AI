<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LUMÉRE — Riwayat Diagnosis</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .history-wrap {
      max-width: 860px; margin: 0 auto;
      padding: 48px 24px 100px;
      position: relative; z-index: 1;
    }
    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 48px; flex-wrap: wrap; gap: 16px;
    }
    .page-eyebrow {
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--rose);
      font-weight: 600; margin-bottom: 8px;
    }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 5vw, 40px); color: var(--ink);
    }
    .history-count {
      font-size: 13px; color: var(--ink-muted);
      padding: 8px 16px;
      background: var(--blush);
      border-radius: var(--radius-pill);
    }

    .empty-state { text-align: center; padding: 80px 20px; }
    .empty-icon { font-size: 56px; margin-bottom: 20px; }
    .empty-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: var(--ink); margin-bottom: 10px; }
    .empty-sub { font-size: 14px; color: var(--ink-muted); margin-bottom: 28px; }

    .history-list { display: flex; flex-direction: column; gap: 20px; }
    .history-card {
      padding: 28px 32px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 20px;
      transition: all var(--transition-fast);
    }
    .history-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .h-icon {
      width: 52px; height: 52px;
      border-radius: var(--radius-md);
      background: var(--rose-pale);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0; color: var(--rose); font-weight: 700;
    }
    .h-type { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--ink); margin-bottom: 4px; }
    .h-name { font-size: 12px; color: var(--ink-muted); margin-bottom: 2px; }
    .h-date { font-size: 12px; color: var(--ink-muted); }
    .h-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .h-grade-badge { font-size: 11px; font-weight: 600; padding: 3px 12px; border-radius: var(--radius-pill); border: 1px solid; }

    .h-actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .btn-sm {
      padding: 8px 18px; font-size: 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--parchment);
      background: transparent;
      color: var(--ink-soft);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all var(--transition-fast);
      white-space: nowrap;
    }
    .btn-sm:hover { border-color: var(--rose); color: var(--rose-deep); background: var(--rose-pale); }
    .btn-sm-danger:hover { border-color: #B04060; color: #B04060; background: #FDEEF2; }

    .score-mini { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
    .score-mini-row { display: flex; align-items: center; gap: 8px; }
    .score-mini-label { width: 80px; font-size: 11px; color: var(--ink-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .score-mini-track { flex: 1; height: 4px; background: var(--blush-deep); border-radius: var(--radius-pill); }
    .score-mini-bar { height: 100%; border-radius: var(--radius-pill); }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(45,26,34,0.6);
      backdrop-filter: blur(8px);
      z-index: 800;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.active { display: flex; animation: fadeIn 0.25s ease; }
    .modal {
      background: var(--white); border-radius: var(--radius-lg);
      padding: 44px 40px; max-width: 600px; width: 100%;
      max-height: 85vh; overflow-y: auto;
      box-shadow: var(--shadow-lg); animation: fadeUp 0.3s ease;
    }
    .modal h2 { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--ink); margin-bottom: 4px; }
    .modal-meta { font-size: 13px; color: var(--ink-muted); margin-bottom: 28px; }
    .modal-section-title {
      font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--rose);
      font-weight: 600; margin-bottom: 12px; margin-top: 24px;
    }
    .modal-rec { padding: 12px 0; border-bottom: 1px solid var(--parchment); font-size: 14px; color: var(--ink-soft); }
    .modal-rec:last-child { border-bottom: none; }
    .modal-rec strong { color: var(--ink); }

    .clear-btn {
      font-size: 12px; color: var(--ink-muted);
      background: none; border: none;
      cursor: pointer; font-family: inherit;
      padding: 6px 12px; border-radius: var(--radius-sm);
      transition: all var(--transition-fast);
    }
    .clear-btn:hover { color: #B04060; background: #FDEEF2; }

    @media (max-width: 600px) {
      .history-card { grid-template-columns: auto 1fr; }
      .h-actions { flex-direction: row; grid-column: 1/-1; }
      .modal { padding: 28px 20px; }
    }
  </style>
</head>
<body>
<div class="bg-ornament" aria-hidden="true"></div>

<nav class="nav">
  <a class="nav-logo" onclick="navigateTo('index.html')">LUMÉRE<span>®</span></a>
  <div class="nav-center">
    <span class="nav-link" onclick="navigateTo('index.html')">Beranda</span>
    <span class="nav-link" onclick="navigateTo('quiz.html')">Diagnosis</span>
    <span class="nav-link active">Riwayat</span>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
    <a class="btn btn-nav" onclick="navigateTo('quiz.html')">✦ Mulai Diagnosis</a>
    <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
  <span class="nav-link" onclick="navigateTo('index.html')">Beranda</span>
  <span class="nav-link" onclick="navigateTo('quiz.html')">Diagnosis</span>
  <span class="nav-link active">Riwayat</span>
  <div class="mobile-menu-actions">
    <button class="theme-toggle" id="themeToggleMobile" aria-label="Toggle dark mode"></button>
    <a class="btn btn-nav" onclick="navigateTo('quiz.html')" style="flex:1;text-align:center;">✦ Mulai Diagnosis</a>
  </div>
</div>

<div class="history-wrap">
  <div class="page-header">
    <div>
      <div class="page-eyebrow">Rekam Jejak</div>
      <h1 class="page-title">Riwayat Diagnosis</h1>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="history-count" id="histCount">0 hasil</span>
      <button class="clear-btn" onclick="clearAll()">✕ Hapus Semua</button>
    </div>
  </div>
  <div id="historyArea"></div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal" id="detailContent"></div>
</div>

<div class="lumere-toast" id="lumere-toast"></div>
<script src="shared.js"></script>
<script>
  applyStoredTheme();
  document.getElementById('themeToggle').addEventListener('click', () => {
    setTheme(getTheme() === 'dark' ? 'light' : 'dark');
  });
  const tmMobile = document.getElementById('themeToggleMobile');
  if (tmMobile) tmMobile.addEventListener('click', () => {
    setTheme(getTheme() === 'dark' ? 'light' : 'dark');
  });
  initHamburger();
  initModalClose('detailModal');

  const gradeColors = { 1: '#2D7A4F', 2: '#B87333', 3: '#D4607A', 4: '#8B1A2A' };
  const gradeBg    = { 1: '#EDFAF4', 2: '#FFF3EA', 3: '#FDEEF2', 4: '#FFF0F3' };
  const scoreColors = {
    oily: '#D4607A', dry: '#E8899B',
    combination: '#9B6080', sensitive: '#B04060', normal: '#6B3050'
  };

  function renderHistory() {
    const hist = getHistory();
    const area = document.getElementById('historyArea');
    document.getElementById('histCount').textContent = hist.length + ' hasil';

    if (hist.length === 0) {
      area.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon" style="color:var(--rose);font-weight:700;">✦</div>
          <h2 class="empty-title">Belum Ada Riwayat</h2>
          <p class="empty-sub">Mulai diagnosis kulitmu dan simpan hasilnya untuk melihat perkembangan.</p>
          <button class="btn btn-primary" onclick="navigateTo('quiz.html')">Mulai Diagnosis →</button>
        </div>`;
      return;
    }

    const cards = hist.map((entry, idx) => {
      const gColor = gradeColors[entry.grade] || '#7A4F60';
      const gBg    = gradeBg[entry.grade]    || '#F5EEF1';
      const scores = entry.scores || {};
      const maxPossible = 9;

      const miniBars = Object.entries(scores).map(([k, v]) => {
        const pct = Math.min(100, Math.round((v / maxPossible) * 100));
        return `<div class="score-mini-row">
          <div class="score-mini-label">${SKIN_TYPES[k] ? SKIN_TYPES[k].name.replace('Kulit ','') : k}</div>
          <div class="score-mini-track"><div class="score-mini-bar" style="width:${pct}%;background:${scoreColors[k]||'#D4607A'}"></div></div>
        </div>`;
      }).join('');

      return `
        <div class="card history-card">
          <div class="h-icon">${entry.icon || '✦'}</div>
          <div class="h-info">
            <div class="h-name">${entry.name !== 'Anonim' ? entry.name : 'Pengguna Anonim'}</div>
            <div class="h-type">${entry.skinTypeName}</div>
            <div class="h-date">${entry.date}</div>
            <div class="h-meta">
              <span class="h-grade-badge" style="color:${gColor};border-color:${gColor};background:${gBg}">Grade ${entry.grade} — ${entry.gradeLabel}</span>
            </div>
            <div class="score-mini" style="margin-top:10px;">${miniBars}</div>
          </div>
          <div class="h-actions">
            <button class="btn-sm" onclick="showDetail(${idx})">Detail →</button>
            <button class="btn-sm btn-sm-danger" onclick="deleteEntry(${idx})">Hapus</button>
          </div>
        </div>`;
    }).join('');

    area.innerHTML = `<div class="history-list">${cards}</div>`;
  }

  function showDetail(idx) {
    const hist = getHistory();
    const entry = hist[idx];
    if (!entry) return;
    const st = SKIN_TYPES[entry.skinType] || {};
    const gr = GRADE_INFO[entry.grade] || {};
    const recs = (RECOMMENDATIONS[entry.skinType] && RECOMMENDATIONS[entry.skinType][entry.grade]) || [];
    const gColor = gradeColors[entry.grade] || '#7A4F60';
    const gBg    = gradeBg[entry.grade]    || '#F5EEF1';
    const scores = entry.scores || {};

    const recsHTML = recs.map(r => `
      <div class="modal-rec">
        ${r.icon} <strong>${r.step}:</strong> ${r.name}
        <div style="font-size:12px;color:var(--ink-muted);margin-top:3px;">${r.desc}</div>
      </div>`).join('');

    const scoresHTML = Object.entries(scores).map(([k, v]) => {
      const sName = SKIN_TYPES[k] ? SKIN_TYPES[k].name : k;
      const isW = k === entry.skinType;
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--parchment);">
        <span style="font-size:16px;">${SKIN_TYPES[k] ? SKIN_TYPES[k].icon : ''}</span>
        <span style="flex:1;font-size:14px;color:${isW ? 'var(--rose-deep)' : 'var(--ink-soft)'};font-weight:${isW ? '600' : '400'}">${sName}</span>
        <span style="font-size:13px;font-weight:600;color:${isW ? 'var(--rose-deep)' : 'var(--ink-muted)'}">${v.toFixed ? v.toFixed(1) : v}</span>
        ${isW ? '<span style="font-size:11px;background:var(--rose-pale);color:var(--rose-deep);padding:2px 10px;border-radius:999px;font-weight:600;">Dominan</span>' : ''}
      </div>`;
    }).join('');

    document.getElementById('detailContent').innerHTML = `
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
        <div style="font-size:40px;">${entry.icon}</div>
        <div>
          <h2>${entry.skinTypeName}</h2>
          <div class="modal-meta">${entry.name} · ${entry.date}</div>
        </div>
      </div>
      <span style="display:inline-block;padding:8px 20px;border-radius:999px;font-size:13px;font-weight:600;color:${gColor};background:${gBg};border:1px solid ${gColor};margin-bottom:24px;">
        Grade ${entry.grade} — ${entry.gradeLabel}
      </span>
      <div class="modal-section-title">Distribusi Skor</div>
      <div>${scoresHTML}</div>
      <div class="modal-section-title">Rekomendasi Skincare</div>
      <div>${recsHTML}</div>
      <div style="margin-top:28px;display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="closeModal('detailModal')" style="flex:1;min-width:120px;">Tutup</button>
      </div>
    `;
    openModal('detailModal');
  }

  function deleteEntry(idx) {
    const hist = getHistory();
    hist.splice(idx, 1);
    localStorage.setItem('lumere_history', JSON.stringify(hist));
    showToast('Riwayat dihapus.', 'default');
    renderHistory();
  }

  function clearAll() {
    if (!confirm('Hapus semua riwayat diagnosis?')) return;
    localStorage.removeItem('lumere_history');
    showToast('Semua riwayat dihapus.', 'default');
    renderHistory();
  }

  renderHistory();
</script>
</body>
</html>
