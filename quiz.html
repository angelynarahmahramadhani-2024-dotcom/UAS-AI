<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LUMÉRE — Diagnosis Kulit</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .quiz-wrap {
      max-width: 680px; margin: 0 auto;
      padding: 48px 24px 80px;
      position: relative; z-index: 1;
    }
    .progress-wrap { margin-bottom: 40px; }
    .progress-numbers {
      display: flex; justify-content: space-between;
      margin-bottom: 10px;
    }
    .progress-numbers span { font-size: 12px; color: var(--ink-muted); }
    .progress-numbers strong { font-size: 14px; font-weight: 600; color: var(--ink); }
    .quiz-step-count { font-size: 13px; color: var(--rose); font-weight: 600; }

    .question-card {
      padding: 44px 40px;
      margin-bottom: 32px;
    }
    .question-card.fade-in {
      animation: fadeUp 0.35s ease;
    }
    .question-card.fade-out {
      animation: fadeOutQ 0.2s ease both;
    }
    @keyframes fadeOutQ {
      to { opacity: 0; transform: translateY(-12px); }
    }
    .q-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px;
      background: var(--rose-pale);
      color: var(--rose-deep);
      border-radius: var(--radius-pill);
      font-size: 11px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 20px;
    }
    .q-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 3vw, 22px);
      color: var(--ink);
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .answers { display: flex; flex-direction: column; gap: 10px; }
    .answer-btn {
      width: 100%;
      padding: 17px 24px;
      background: var(--cream);
      border: 1.5px solid var(--parchment);
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500;
      color: var(--ink-soft);
      cursor: pointer;
      transition: all var(--transition-fast);
      text-align: left;
      display: flex; align-items: center; gap: 14px;
    }
    .answer-btn:hover {
      border-color: var(--rose);
      background: var(--rose-pale);
      color: var(--ink);
      transform: translateX(4px);
    }
    .answer-btn.selected {
      border-color: var(--rose);
      background: var(--rose-pale);
      color: var(--rose-deep);
      box-shadow: 0 0 0 3px rgba(212,96,122,0.15);
    }
    .answer-btn.selected::after {
      content: '✓';
      margin-left: auto;
      font-size: 16px;
      color: var(--rose);
    }
    .answer-icon { font-size: 16px; flex-shrink: 0; color: var(--rose); font-weight: 700; }

    .quiz-nav {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .skip-hint {
      text-align: center;
      margin-top: 16px;
      font-size: 12px; color: var(--ink-muted);
    }

    .q-dots {
      display: flex; flex-wrap: wrap; gap: 5px;
      justify-content: center;
      margin-bottom: 40px;
    }
    .q-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--blush-deep);
      transition: all var(--transition-fast);
    }
    .q-dot.answered { background: var(--rose-light); }
    .q-dot.current  { background: var(--rose-deep); transform: scale(1.3); }

    /* Name gate modal */
    .name-gate-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(45,26,34,0.6);
      backdrop-filter: blur(8px);
      z-index: 800;
      justify-content: center; padding: 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .name-gate-overlay.active { display: flex; animation: fadeIn 0.25s ease; }
    .name-gate-modal {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 44px 40px; max-width: 480px; width: 100%;
      box-shadow: var(--shadow-lg);
      animation: fadeUp 0.3s ease;
      text-align: center;
    }
    .name-gate-modal h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; color: var(--ink); margin-bottom: 8px;
    }
    .name-gate-modal p {
      font-size: 14px; color: var(--ink-muted); margin-bottom: 24px;
    }
    .name-gate-input {
      width: 100%; padding: 16px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; color: var(--ink);
      background: var(--cream);
      border: 1.5px solid var(--parchment);
      border-radius: var(--radius-pill);
      outline: none; text-align: center;
      margin-bottom: 16px;
      transition: border-color var(--transition-fast);
    }
    .name-gate-input:focus { border-color: var(--rose); }
    .name-gate-input::placeholder { color: var(--ink-muted); font-style: italic; }

    @media (max-width: 600px) {
      .question-card { padding: 32px 24px; }
      .quiz-wrap { padding: 32px 16px 60px; }
      .name-gate-modal { padding: 32px 24px; }
    }
  </style>
</head>
<body>
<div class="bg-ornament" aria-hidden="true"></div>

<nav class="nav">
  <a class="nav-logo" onclick="navigateTo('index.html')">LUMÉRE<span>®</span></a>
  <div class="nav-center">
    <span class="nav-link" onclick="navigateTo('index.html')">Beranda</span>
    <span class="nav-link active">Diagnosis</span>
    <span class="nav-link" onclick="navigateTo('history.html')">Riwayat</span>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
    <a class="btn btn-nav" onclick="navigateTo('history.html')">Riwayat</a>
    <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
  <span class="nav-link" onclick="navigateTo('index.html')">Beranda</span>
  <span class="nav-link active">Diagnosis</span>
  <span class="nav-link" onclick="navigateTo('history.html')">Riwayat</span>
  <div class="mobile-menu-actions">
    <button class="theme-toggle" id="themeToggleMobile" aria-label="Toggle dark mode"></button>
    <a class="btn btn-nav" onclick="navigateTo('history.html')" style="flex:1;text-align:center;">Riwayat</a>
  </div>
</div>

<!-- Name Gate Modal — shows if no name was entered -->
<div class="name-gate-overlay" id="nameGate">
  <div class="name-gate-modal">
    <div style="font-size:28px;margin-bottom:16px;color:var(--rose);">✦</div>
    <h2>Siapa Namamu?</h2>
    <p>Masukkan nama kamu terlebih dahulu untuk memulai diagnosis kulit.</p>
    <input type="text" class="name-gate-input" id="nameGateInput" placeholder="Nama kamu…" maxlength="30" autocomplete="off"/>
    <button class="btn btn-primary" onclick="submitNameGate()" style="width:100%;font-size:15px;padding:16px;">
      Lanjut ke Diagnosis →
    </button>
  </div>
</div>

<div class="quiz-wrap" id="quizContent">
  <div class="progress-wrap">
    <div class="progress-numbers">
      <span>Pertanyaan <strong id="qNum">1</strong> dari 15</span>
      <span id="qPct" class="quiz-step-count">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="q-dots" id="qDots"></div>
  <div id="questionArea"></div>

  <div class="quiz-nav">
    <button class="btn btn-secondary" id="btnPrev" onclick="prevQ()" disabled>← Kembali</button>
    <button class="btn btn-primary" id="btnNext" onclick="nextQ()">Lanjut →</button>
  </div>
  <p class="skip-hint">Tekan Enter atau ketuk "Lanjut" setelah memilih jawaban</p>
</div>

<div class="lumere-toast" id="lumere-toast"></div>
<script src="shared.js"></script>
<script>
  applyStoredTheme();
  document.getElementById('themeToggle').addEventListener('click', () => {
    setTheme(getTheme() === 'dark' ? 'light' : 'dark');
  });
  const tmMobile = document.getElementById('themeToggleMobile');
  if (tmMobile) tmMobile.addEventListener('click', () => {
    setTheme(getTheme() === 'dark' ? 'light' : 'dark');
  });
  initHamburger();

  // ─── Name Gate: require name before diagnosis ──────
  const storedName = localStorage.getItem('lumere_username') || '';
  if (!storedName.trim()) {
    openModal('nameGate');
    document.getElementById('quizContent').style.display = 'none';
  }

  document.getElementById('nameGateInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitNameGate();
  });

  function submitNameGate() {
    const name = document.getElementById('nameGateInput').value.trim();
    if (!name) {
      showToast('Silakan masukkan nama kamu terlebih dahulu', 'error');
      return;
    }
    localStorage.setItem('lumere_username', name);
    closeModal('nameGate');
    document.getElementById('quizContent').style.display = '';
  }

  // ─── Quiz Logic ────────────────────────────────────
  let currentQ = 0;
  const answers = new Array(15).fill(null);

  function initDots() {
    const container = document.getElementById('qDots');
    container.innerHTML = '';
    for (let i = 0; i < 15; i++) {
      const dot = document.createElement('div');
      dot.className = 'q-dot';
      dot.id = 'dot-' + i;
      container.appendChild(dot);
    }
  }

  function updateDots() {
    for (let i = 0; i < 15; i++) {
      const dot = document.getElementById('dot-' + i);
      dot.className = 'q-dot';
      if (i === currentQ) dot.classList.add('current');
      else if (answers[i] !== null) dot.classList.add('answered');
    }
  }

  function renderQ(animate = true) {
    const q = QUESTIONS[currentQ];
    const pct = Math.round((currentQ / 15) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('qNum').textContent = currentQ + 1;
    document.getElementById('qPct').textContent = pct + '%';
    document.getElementById('btnPrev').disabled = currentQ === 0;
    document.getElementById('btnNext').textContent = currentQ === 14 ? 'Lihat Hasil →' : 'Lanjut →';

    const sel = answers[currentQ];
    const icons = { ya:'◉', kadang: '◎', tidak: '○' };
    const labels = { ya: 'Ya, selalu', kadang: 'Kadang-kadang', tidak: 'Tidak' };

    document.getElementById('questionArea').innerHTML = `
      <div class="card question-card${animate ? ' fade-in' : ''}">
        <div class="q-badge">Pertanyaan ${currentQ + 1} / 15</div>
        <p class="q-text">${q.text}</p>
        <div class="answers">
          ${['ya','kadang','tidak'].map(opt => `
            <button class="answer-btn${sel === opt ? ' selected' : ''}"
              onclick="selectAnswer('${opt}')" id="ans-${opt}">
              <span class="answer-icon">${icons[opt]}</span>
              ${labels[opt]}
            </button>
          `).join('')}
        </div>
      </div>
    `;
    updateDots();
  }

  function selectAnswer(opt) {
    answers[currentQ] = opt;
    document.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
    const btn = document.getElementById('ans-' + opt);
    if (btn) btn.classList.add('selected');
    updateDots();
    // No auto-advance. User clicks "Lanjut" button to continue.
  }

  function nextQ() {
    if (answers[currentQ] === null) {
      showToast('Pilih jawaban terlebih dahulu', 'error');
      return;
    }
    if (currentQ < 14) {
      // Smooth in-page transition
      const card = document.querySelector('.question-card');
      if (card) {
        card.classList.remove('fade-in');
        card.classList.add('fade-out');
        setTimeout(() => {
          currentQ++;
          renderQ(true);
        }, 200);
      } else {
        currentQ++;
        renderQ(true);
      }
    } else {
      finish();
    }
  }

  function prevQ() {
    if (currentQ > 0) {
      const card = document.querySelector('.question-card');
      if (card) {
        card.classList.remove('fade-in');
        card.classList.add('fade-out');
        setTimeout(() => {
          currentQ--;
          renderQ(true);
        }, 200);
      } else {
        currentQ--;
        renderQ(true);
      }
    }
  }

  function finish() {
    const result = processAnswers(answers);
    localStorage.setItem('lumere_result', JSON.stringify({ ...result, answers }));
    navigateTo('results.html');
  }

  document.addEventListener('keydown', e => {
    if (document.getElementById('nameGate').classList.contains('active')) return;
    if (e.key === '1') selectAnswer('ya');
    else if (e.key === '2') selectAnswer('kadang');
    else if (e.key === '3') selectAnswer('tidak');
    else if (e.key === 'Enter') nextQ();
    else if (e.key === 'ArrowLeft') prevQ();
  });

  initDots();
  renderQ(false);
</script>
</body>
</html>
